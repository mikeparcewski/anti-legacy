name: CI

# Run the plugin's own test suite on every push / PR so regressions in the
# scripts (manifest, coverage, domain_graph, compare_graphs, test_runner, …) are
# caught automatically. Tests that need the wicked-estate engine binary skip
# gracefully when it is absent (CI has no engine), so the hermetic suite still
# gates. (ISS-13)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run test suite
        run: python -m pytest -q
